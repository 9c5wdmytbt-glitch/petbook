<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>LAST FLARE</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
  html, body {
    height: 100%; background: #050810; overflow: hidden;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #dfe3ff;
  }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* ---- HUD ---- */
  #hud { position: fixed; z-index: 4; inset: 0; pointer-events: none; display: none; }
  #hud.shown { display: block; }
  #hpWrap {
    position: absolute; top: calc(env(safe-area-inset-top) + 12px); left: 14px;
    width: 34vw; max-width: 170px; height: 13px;
    border: 1px solid rgba(255,214,106,.4); border-radius: 7px; overflow: hidden;
    background: rgba(10,12,24,.6);
  }
  #hpBar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff6a40, #ffd76a); transition: width .15s; }
  #clock {
    position: absolute; top: calc(env(safe-area-inset-top) + 10px); left: 50%; transform: translateX(-50%);
    font-size: 19px; font-weight: 800; letter-spacing: 2px; font-variant-numeric: tabular-nums;
    color: #eef; text-shadow: 0 0 12px rgba(255,214,106,.3);
  }
  #killsHud {
    position: absolute; top: calc(env(safe-area-inset-top) + 12px); right: 64px;
    font-size: 14px; font-weight: 800; color: #9aa0c8; letter-spacing: 1px;
    font-variant-numeric: tabular-nums; text-align: right;
  }
  #xpWrap {
    position: absolute; left: 0; right: 0; bottom: 0; height: 5px;
    background: rgba(120,130,255,.12);
  }
  #xpBar { height: 100%; width: 0%; background: linear-gradient(90deg, #ffd76a, #fff6d8); transition: width .12s; }
  #lvlChip {
    position: absolute; bottom: 10px; left: 12px;
    font-size: 11px; font-weight: 800; letter-spacing: 1.5px; color: #ffd76a;
  }

  /* ---- buttons ---- */
  button {
    font-family: inherit; color: #eef;
    background: rgba(120,130,255,.08); border: 1px solid rgba(140,150,255,.35);
    border-radius: 14px; font-size: 16px; font-weight: 700; letter-spacing: 2px;
    padding: 14px 26px; min-width: 220px;
  }
  button:active { background: rgba(140,150,255,.22); }
  button.primary {
    background: linear-gradient(180deg, rgba(255,214,106,.18), rgba(255,154,61,.12));
    border-color: rgba(255,200,100,.55); color: #ffe9b8;
  }
  button.small { min-width: 0; padding: 10px 16px; font-size: 13px; }
  #muteBtn, #pauseBtn {
    position: fixed; z-index: 6; top: calc(env(safe-area-inset-top) + 8px);
    width: 42px; height: 38px; min-width: 0; padding: 0; font-size: 14px; border-radius: 10px;
  }
  #muteBtn { right: 10px; }
  #pauseBtn { right: 58px; display: none; }
  #pauseBtn.shown { display: block; }

  /* ---- panels ---- */
  .panel {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; text-align: center;
    background: rgba(5,8,16,.78);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: 24px;
  }
  .panel.hidden { display: none; }
  .title {
    font-size: 46px; font-weight: 800; letter-spacing: 8px; margin-left: 8px;
    background: linear-gradient(180deg, #fff6d8, #ffd76a 55%, #ff9a3d);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 46px rgba(255,190,80,.35);
  }
  .tagline { font-size: 13px; color: #9aa0c8; letter-spacing: 1px; max-width: 320px; line-height: 1.6; }
  .stats-line { font-size: 13px; color: #c8cdf0; letter-spacing: 2px; }
  .stats-line b { color: #ffd76a; font-variant-numeric: tabular-nums; }
  .run-stats { display: grid; grid-template-columns: auto auto; gap: 6px 22px; font-size: 14px; color: #9aa0c8; }
  .run-stats b { color: #dfe3ff; text-align: right; font-variant-numeric: tabular-nums; }
  #overScore { font-size: 46px; font-weight: 800; color: #ffd76a; font-variant-numeric: tabular-nums;
               text-shadow: 0 0 30px rgba(255,190,80,.35); }
  #overTag { font-size: 13px; letter-spacing: 3px; color: #ff8f6a; min-height: 16px; }
  .pulse { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>

<div id="hud">
  <div id="hpWrap"><div id="hpBar"></div></div>
  <div id="clock">0:00</div>
  <div id="killsHud">0</div>
  <div id="xpWrap"><div id="xpBar"></div></div>
  <div id="lvlChip">LV 1</div>
</div>
<button id="pauseBtn">&#10074;&#10074;</button>
<button id="muteBtn">&#128266;</button>

<div class="panel" id="menu">
  <div class="title">LAST FLARE</div>
  <div class="tagline">The line broke. You didn't.<br>
    Hold the field alone &mdash; your weapons fire themselves; you just have to
    keep moving. Salvage everything.</div>
  <button class="primary" id="btnDeploy">DEPLOY</button>
  <div class="stats-line" id="menuStats"></div>
  <div class="tagline" style="font-size:11px;color:#6a7090">
    DRAG to move &middot; weapons auto-fire &middot; grab salvage to level up</div>
</div>

<div class="panel hidden" id="gameover">
  <div style="font-size:15px;letter-spacing:6px;color:#9aa0c8">OVERRUN</div>
  <div id="overScore">0:00</div>
  <div id="overTag"></div>
  <div class="run-stats">
    <span>Kills</span><b id="ovKills">0</b>
    <span>Level reached</span><b id="ovLevel">1</b>
    <span>Salvage</span><b id="ovSalvage">0</b>
  </div>
  <button class="primary" id="btnRetry">GO AGAIN</button>
  <button class="small" id="btnMenu">MENU</button>
</div>

<div class="panel hidden" id="paused">
  <div style="font-size:22px;letter-spacing:8px;color:#dfe3ff">HOLD</div>
  <div class="tagline pulse">Tap to resume</div>
</div>

<script>
'use strict';

/* ================================================================== */
/*  Infra: storage, canvas, RNG                                       */
/* ================================================================== */
const store = {
  get(k, d) { try { const v = localStorage.getItem('lastflare-' + k); return v === null ? d : JSON.parse(v); } catch (e) { return d; } },
  set(k, v) { try { localStorage.setItem('lastflare-' + k, JSON.stringify(v)); } catch (e) {} },
};
function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, S = 1, dpr = 1;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  S = Math.max(0.7, Math.min(1.6, Math.min(W, H) / 480));
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
resize();

/* glow sprites (pre-rendered radial gradients) */
const glowCache = {};
function glow(color) {
  if (glowCache[color]) return glowCache[color];
  const size = 96, c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(48, 48, 0, 48, 48, 48);
  grad.addColorStop(0, color);
  grad.addColorStop(0.4, color.replace('1)', '.3)'));
  grad.addColorStop(1, color.replace('1)', '0)'));
  g.fillStyle = grad; g.fillRect(0, 0, size, size);
  glowCache[color] = c;
  return c;
}
function drawGlow(color, x, y, r) { ctx.drawImage(glow(color), x - r, y - r, r * 2, r * 2); }

/* ================================================================== */
/*  Tunables                                                          */
/* ================================================================== */
const ARENA_R = 1400;          // soft boundary radius (world units = px at S=1)
const MAX_ENEMIES = 200, MAX_PROJ = 300, MAX_PARTS = 400, MAX_GEMS = 250, MAX_POPS = 64;
const IFRAMES = 0.8;

const ENEMY_TYPES = {
  rusher:  { r: 12, hp: 14,  speed: 92,  dmg: 8,  gems: 1, gemV: 1, color: '#8093c9', glow: 'rgba(122,143,208,1)' },
  shooter: { r: 13, hp: 22,  speed: 66,  dmg: 6,  gems: 2, gemV: 1, color: '#b9c8e8', glow: 'rgba(186,200,255,1)', range: 230, shotCd: 2.4 },
  heavy:   { r: 22, hp: 110, speed: 38,  dmg: 18, gems: 3, gemV: 3, color: '#c9a35a', glow: 'rgba(255,180,90,1)' },
};

/* ================================================================== */
/*  Run state                                                         */
/* ================================================================== */
let state = 'menu'; // menu | playing | upgrade | gameover | paused
let anim = 0, timeScale = 1, shake = 0, flash = 0, freeze = 0;
let muted = store.get('muted', (function () {
  try { // inherit the arcade's mute if the player muted the other games
    return localStorage.getItem('trenchfox-muted') === '1' ||
           localStorage.getItem('starshell-muted') === 'true';
  } catch (e) { return false; }
})());

const run = {
  t: 0, kills: 0, salvage: 0, level: 1, xp: 0, xpNeed: 6,
  hp: 100, maxHp: 100, inv: 0,
  wave: 1, waveT: 0, lull: false,
  timeToFirstKill: null,
};
const player = { x: 0, y: 0, vx: 0, vy: 0, r: 13, speed: 215, aimX: 1, aimY: 0 };
const camera = { x: 0, y: 0 };

let rngSpawn = Math.random;   // replaced by seeded streams in daily mode
let weapons = [];             // [{id, lvl, cd}]
const passives = { speed: 0, rate: 0, magnet: 0, maxhp: 0 };

/* ================================================================== */
/*  Pools                                                             */
/* ================================================================== */
function makePool(n, init) {
  const items = new Array(n);
  for (let i = 0; i < n; i++) { items[i] = init(); items[i].alive = false; }
  return { items, n, cursor: 0, count: 0 };
}
function alloc(pool) {
  for (let k = 0; k < pool.n; k++) {
    const i = (pool.cursor + k) % pool.n;
    if (!pool.items[i].alive) {
      pool.cursor = (i + 1) % pool.n;
      pool.items[i].alive = true;
      pool.count++;
      return pool.items[i];
    }
  }
  return null; // pool exhausted (hard cap)
}
function free(pool, item) { if (item.alive) { item.alive = false; pool.count--; } }

const enemies = makePool(MAX_ENEMIES, () => ({ x: 0, y: 0, vx: 0, vy: 0, type: 'rusher', hp: 0, maxHp: 0, r: 0, hitT: 0, shotT: 0 }));
const projs   = makePool(MAX_PROJ,   () => ({ x: 0, y: 0, vx: 0, vy: 0, r: 0, dmg: 0, life: 0, hostile: false, pierce: 0, kind: 'bullet' }));
const parts   = makePool(MAX_PARTS,  () => ({ x: 0, y: 0, vx: 0, vy: 0, t: 0, max: 1, r: 2, color: '' }));
const gems    = makePool(MAX_GEMS,   () => ({ x: 0, y: 0, v: 1, t: 0 }));
const pops    = makePool(MAX_POPS,   () => ({ x: 0, y: 0, t: 0, txt: '', color: '' }));

function burst(x, y, n, color, speed) {
  for (let i = 0; i < n; i++) {
    const p = alloc(parts);
    if (!p) return;
    const a = Math.random() * 6.283, v = (0.3 + Math.random() * 0.7) * speed;
    p.x = x; p.y = y; p.vx = Math.cos(a) * v; p.vy = Math.sin(a) * v;
    p.t = p.max = 0.35 + Math.random() * 0.3; p.r = 2 + Math.random() * 3; p.color = color;
  }
}
function popup(x, y, txt, color) {
  const p = alloc(pops);
  if (!p) return;
  p.x = x; p.y = y; p.t = 0.8; p.txt = txt; p.color = color;
}

/* spatial hash for enemies (rebuilt each frame; queries for shots/contact) */
const CELL = 72;
let grid = new Map();
function gridKey(x, y) { return ((x / CELL) | 0) * 100000 + ((y / CELL) | 0); }
function rebuildGrid() {
  grid.clear();
  for (const e of enemies.items) {
    if (!e.alive) continue;
    const k = gridKey(e.x, e.y);
    let b = grid.get(k);
    if (!b) { b = []; grid.set(k, b); }
    b.push(e);
  }
}
function eachEnemyNear(x, y, r, fn) {
  const x0 = ((x - r) / CELL) | 0, x1 = ((x + r) / CELL) | 0;
  const y0 = ((y - r) / CELL) | 0, y1 = ((y + r) / CELL) | 0;
  for (let gx = x0; gx <= x1; gx++) for (let gy = y0; gy <= y1; gy++) {
    const b = grid.get(gx * 100000 + gy);
    if (b) for (const e of b) if (e.alive) fn(e);
  }
}
function nearestEnemy(x, y, maxR) {
  let best = null, bd = maxR * maxR;
  for (const e of enemies.items) {
    if (!e.alive) continue;
    const d = (e.x - x) ** 2 + (e.y - y) ** 2;
    if (d < bd) { bd = d; best = e; }
  }
  return best;
}

/* ================================================================== */
/*  Weapons (auto-fire; stage 1 ships the rifle, stage 2 the rest)    */
/* ================================================================== */
const WEAPONS = {
  rifle: {
    name: 'Service Rifle', desc: 'Straight shots at the nearest threat',
    cd: 0.55,
    fire(lvl) {
      const t = nearestEnemy(player.x, player.y, 500);
      if (!t) return false;
      const dx = t.x - player.x, dy = t.y - player.y;
      const d = Math.hypot(dx, dy) || 1;
      player.aimX = dx / d; player.aimY = dy / d;
      const shots = lvl >= 4 ? 5 : lvl >= 3 ? 3 : lvl >= 2 ? 2 : 1;
      const px = -dy / d, py = dx / d; // perpendicular spread
      for (let i = 0; i < shots; i++) {
        const off = (i - (shots - 1) / 2) * 10;
        const p = alloc(projs);
        if (!p) break;
        p.x = player.x + px * off; p.y = player.y + py * off;
        p.vx = dx / d * 520; p.vy = dy / d * 520;
        p.r = 4; p.dmg = 10; p.life = 1.1; p.hostile = false;
        p.pierce = lvl >= 4 ? 1 : 0; p.kind = 'bullet';
      }
      sfx.shot();
      return true;
    },
  },
};

function fireWeapons(dt) {
  for (const w of weapons) {
    w.cd -= dt * (1 + passives.rate * 0.12);
    if (w.cd <= 0) {
      if (WEAPONS[w.id].fire(w.lvl)) w.cd = WEAPONS[w.id].cd;
      else w.cd = 0.12; // nothing in range: re-check soon
    }
  }
}

/* ================================================================== */
/*  Spawning: escalating waves off-screen                             */
/* ================================================================== */
let spawnT = 0;
function spawnBudget() {
  // enemies per second, escalating with run time; brief lull between waves
  const base = 0.7 + run.t * 0.016;
  return run.lull ? base * 0.25 : base * (0.6 + 0.4 * Math.min(1, run.waveT / 20));
}
function pickType() {
  const r = rngSpawn();
  if (run.t > 75 && r < 0.12) return 'heavy';
  if (run.t > 40 && r < 0.38) return 'shooter';
  return 'rusher';
}
function spawnEnemy(type) {
  const e = alloc(enemies);
  if (!e) return null;
  const spec = ENEMY_TYPES[type];
  const a = rngSpawn() * 6.283;
  const d = Math.max(W, H) * 0.62 + 60; // just off-screen from the camera
  e.x = camera.x + Math.cos(a) * d;
  e.y = camera.y + Math.sin(a) * d;
  // keep inside the world
  const wd = Math.hypot(e.x, e.y);
  if (wd > ARENA_R) { e.x *= ARENA_R / wd; e.y *= ARENA_R / wd; }
  e.vx = e.vy = 0;
  e.type = type;
  const hpMul = 1 + run.t / 110;
  e.hp = e.maxHp = spec.hp * hpMul;
  e.r = spec.r; e.hitT = 0; e.shotT = 1 + rngSpawn() * 2;
  return e;
}
function updateSpawning(dt) {
  run.waveT += dt;
  if (!run.lull && run.waveT >= 26) { run.lull = true; run.waveT = 0; }
  else if (run.lull && run.waveT >= 5) { run.lull = false; run.waveT = 0; run.wave++; }
  spawnT -= dt;
  if (spawnT <= 0) {
    spawnEnemy(pickType());
    spawnT = 1 / spawnBudget();
  }
}

/* ================================================================== */
/*  Damage model                                                      */
/* ================================================================== */
function hurtPlayer(dmg) {
  if (run.inv > 0 || state !== 'playing') return;
  run.hp -= dmg;
  run.inv = IFRAMES;
  shake = Math.max(shake, 8);
  flash = Math.max(flash, 0.25);
  burst(player.x, player.y, 8, 'rgba(255,106,64,1)', 220);
  vibrate(40);
  sfx.hurt();
  if (run.hp <= 0) { run.hp = 0; endRun(); }
}
function damageEnemy(e, dmg, kx, ky) {
  e.hp -= dmg;
  e.hitT = 0.1;
  popup(e.x, e.y - e.r - 6, String(Math.round(dmg)), '#ffe9b8');
  if (e.hp <= 0) killEnemy(e);
  else if (kx) { e.vx += kx; e.vy += ky; }
}
function killEnemy(e) {
  const spec = ENEMY_TYPES[e.type];
  free(enemies, e);
  run.kills++;
  if (run.timeToFirstKill === null) run.timeToFirstKill = run.t;
  burst(e.x, e.y, e.type === 'heavy' ? 14 : 6, spec.glow, 240);
  if (e.type === 'heavy') { freeze = 0.06; shake = Math.max(shake, 5); }
  for (let i = 0; i < spec.gems; i++) {
    const g = alloc(gems) || mergeGem();
    if (!g) break;
    g.x = e.x + (Math.random() - 0.5) * 22;
    g.y = e.y + (Math.random() - 0.5) * 22;
    g.v = spec.gemV; g.t = 0;
  }
  if (e.type === 'heavy' && Math.random() < 0.25) {
    const g = alloc(gems);
    if (g) { g.x = e.x; g.y = e.y; g.v = -1; g.t = 0; } // v=-1 marks a medkit
  }
  sfx.kill(e.type === 'heavy');
}
function mergeGem() { // pool full: fold the oldest gem's value into a new one
  let oldest = null;
  for (const g of gems.items) if (g.alive && g.v > 0 && (!oldest || g.t > oldest.t)) oldest = g;
  return oldest;
}

function gainXp(v) {
  run.xp += v;
  run.salvage += v;
  while (run.xp >= run.xpNeed) {
    run.xp -= run.xpNeed;
    run.level++;
    run.xpNeed = 5 + run.level * 3;
    onLevelUp();
  }
}
/* stage 2 replaces this with the upgrade choice */
function onLevelUp() {
  run.hp = Math.min(run.maxHp, run.hp + 10);
  popup(player.x, player.y - 24, 'LEVEL ' + run.level, '#ffd76a');
  sfx.levelup();
}

/* ================================================================== */
/*  Update                                                            */
/* ================================================================== */
const ptr = { down: false, x: 0, y: 0, id: null };

function update(dt) {
  anim += dt;
  timeScale += (1 - timeScale) * Math.min(1, 5 * dt);
  shake = Math.max(0, shake - 50 * dt);
  flash = Math.max(0, flash - 2 * dt);
  for (const p of pops.items) if (p.alive) { p.t -= dt; p.y -= 24 * dt; if (p.t <= 0) free(pops, p); }
  for (const p of parts.items) if (p.alive) {
    p.t -= dt; p.x += p.vx * dt * timeScale; p.y += p.vy * dt * timeScale;
    p.vx *= 0.97; p.vy *= 0.97;
    if (p.t <= 0) free(parts, p);
  }
  if (state !== 'playing') return;
  if (freeze > 0) { freeze -= dt; if (freeze > 0) return; }
  const gdt = dt * timeScale;
  run.t += gdt;
  if (run.inv > 0) run.inv -= gdt;

  /* --- player steering (drag anywhere; the stick is the world) --- */
  let tvx = 0, tvy = 0;
  if (ptr.down) {
    const wx = camera.x + (ptr.x - W / 2), wy = camera.y + (ptr.y - H / 2);
    const dx = wx - player.x, dy = wy - player.y;
    const d = Math.hypot(dx, dy);
    if (d > 6) {
      const sp = player.speed * (1 + passives.speed * 0.08) * S * Math.min(1, d / (60 * S));
      tvx = dx / d * sp; tvy = dy / d * sp;
    }
  }
  const ease = Math.min(1, 8 * gdt);
  player.vx += (tvx - player.vx) * ease;
  player.vy += (tvy - player.vy) * ease;
  player.x += player.vx * gdt;
  player.y += player.vy * gdt;
  const pd = Math.hypot(player.x, player.y);
  if (pd > ARENA_R) { // soft boundary
    player.x -= player.x / pd * (pd - ARENA_R) * Math.min(1, 6 * gdt);
    player.y -= player.y / pd * (pd - ARENA_R) * Math.min(1, 6 * gdt);
  }
  camera.x += (player.x - camera.x) * Math.min(1, 5 * gdt);
  camera.y += (player.y - camera.y) * Math.min(1, 5 * gdt);

  /* --- spawning + enemies --- */
  updateSpawning(gdt);
  rebuildGrid();
  for (const e of enemies.items) {
    if (!e.alive) continue;
    const spec = ENEMY_TYPES[e.type];
    if (e.hitT > 0) e.hitT -= gdt;
    let ax = player.x - e.x, ay = player.y - e.y;
    const ad = Math.hypot(ax, ay) || 1;
    let sp = spec.speed * S;
    if (e.type === 'shooter') {
      e.shotT -= gdt;
      if (ad < spec.range * S) {
        if (e.shotT <= 0) { // volley at the player
          e.shotT = spec.shotCd;
          const p = alloc(projs);
          if (p) {
            p.x = e.x; p.y = e.y;
            p.vx = ax / ad * 170 * S; p.vy = ay / ad * 170 * S;
            p.r = 5; p.dmg = spec.dmg; p.life = 2.6; p.hostile = true; p.kind = 'orb';
            sfx.enemyShot();
          }
        }
        ax = -ax; ay = -ay; sp *= 0.45; // hold range
      }
    }
    let dvx = ax / ad * sp, dvy = ay / ad * sp;
    // separation via the spatial grid (only near neighbours)
    eachEnemyNear(e.x, e.y, 30, o => {
      if (o === e) return;
      const ox = e.x - o.x, oy = e.y - o.y;
      const od = Math.hypot(ox, oy);
      if (od > 0.01 && od < 30) {
        dvx += ox / od * 130 * (1 - od / 30);
        dvy += oy / od * 130 * (1 - od / 30);
      }
    });
    const se = Math.min(1, 2.4 * gdt);
    e.vx += (dvx - e.vx) * se;
    e.vy += (dvy - e.vy) * se;
    e.x += e.vx * gdt;
    e.y += e.vy * gdt;
    /* contact damage */
    const cd = Math.hypot(e.x - player.x, e.y - player.y);
    if (cd < e.r * S + player.r * S) hurtPlayer(spec.dmg);
  }

  /* --- weapons + projectiles --- */
  fireWeapons(gdt);
  for (const p of projs.items) {
    if (!p.alive) continue;
    p.life -= gdt;
    p.x += p.vx * gdt; p.y += p.vy * gdt;
    if (p.life <= 0) { free(projs, p); continue; }
    if (p.hostile) {
      if (Math.hypot(p.x - player.x, p.y - player.y) < p.r * S + player.r * S) {
        free(projs, p);
        hurtPlayer(p.dmg);
      }
      continue;
    }
    let consumed = false;
    eachEnemyNear(p.x, p.y, p.r + 26, e => {
      if (consumed && p.pierce <= 0) return;
      if (Math.hypot(e.x - p.x, e.y - p.y) < e.r + p.r + 2) {
        damageEnemy(e, p.dmg);
        if (p.pierce > 0) p.pierce--;
        else consumed = true;
      }
    });
    if (consumed) free(projs, p);
  }

  /* --- gems / pickups --- */
  const magnetR = (70 + passives.magnet * 30) * S;
  for (const g of gems.items) {
    if (!g.alive) continue;
    g.t += gdt;
    const dx = player.x - g.x, dy = player.y - g.y;
    const d = Math.hypot(dx, dy);
    if (d < magnetR && g.v > 0) { g.x += dx / d * 340 * S * gdt; g.y += dy / d * 340 * S * gdt; }
    if (d < 20 * S) {
      free(gems, g);
      if (g.v < 0) { // medkit
        run.hp = Math.min(run.maxHp, run.hp + run.maxHp * 0.3);
        popup(player.x, player.y - 24, '+HP', '#7dff9a');
        sfx.medkit();
      } else {
        gainXp(g.v);
        sfx.gem();
      }
    }
  }
}

/* ================================================================== */
/*  Run lifecycle                                                     */
/* ================================================================== */
function resetRun() {
  run.t = 0; run.kills = 0; run.salvage = 0; run.level = 1; run.xp = 0; run.xpNeed = 6;
  run.maxHp = 100; run.hp = run.maxHp; run.inv = 0;
  run.wave = 1; run.waveT = 0; run.lull = false;
  run.timeToFirstKill = null;
  player.x = player.y = player.vx = player.vy = 0;
  camera.x = camera.y = 0;
  for (const pool of [enemies, projs, parts, gems, pops]) {
    for (const it of pool.items) it.alive = false;
    pool.count = 0;
  }
  weapons = [{ id: 'rifle', lvl: 1, cd: 0.4 }];
  passives.speed = passives.rate = passives.magnet = passives.maxhp = 0;
  rngSpawn = Math.random;
  spawnT = 0.8;
  timeScale = 1; shake = 0; flash = 0; freeze = 0;
}
function startRun() {
  resetRun();
  setState('playing');
  sfx.deploy();
}
function endRun() {
  burst(player.x, player.y, 30, 'rgba(255,214,106,1)', 320);
  shake = 16; vibrate(120);
  sfx.death();
  const best = store.get('bestTime', 0);
  const isBest = run.t > best;
  if (isBest) store.set('bestTime', run.t);
  store.set('salvageBank', store.get('salvageBank', 0) + run.salvage);
  document.getElementById('overScore').textContent = fmtTime(run.t);
  document.getElementById('overTag').textContent = isBest ? 'LONGEST STAND' : '';
  document.getElementById('ovKills').textContent = run.kills;
  document.getElementById('ovLevel').textContent = run.level;
  document.getElementById('ovSalvage').textContent = '+' + run.salvage;
  setState('gameover');
}
function fmtTime(t) { return ((t / 60) | 0) + ':' + String((t % 60) | 0).padStart(2, '0'); }

function setState(s) {
  state = s;
  document.getElementById('menu').classList.toggle('hidden', s !== 'menu');
  document.getElementById('gameover').classList.toggle('hidden', s !== 'gameover');
  document.getElementById('paused').classList.toggle('hidden', s !== 'paused');
  document.getElementById('hud').classList.toggle('shown', s === 'playing' || s === 'paused' || s === 'upgrade');
  document.getElementById('pauseBtn').classList.toggle('shown', s === 'playing');
  if (s === 'menu') {
    const bank = store.get('salvageBank', 0), best = store.get('bestTime', 0);
    document.getElementById('menuStats').innerHTML =
      (best > 0 ? 'LONGEST STAND <b>' + fmtTime(best) + '</b> &nbsp;&middot;&nbsp; ' : '') +
      'SALVAGE <b>' + bank.toLocaleString() + '</b>';
  }
}

/* ================================================================== */
/*  Render                                                            */
/* ================================================================== */
function worldToScreen(x, y) { return [x - camera.x + W / 2, y - camera.y + H / 2]; }
function onScreen(x, y, m) {
  const sx = x - camera.x + W / 2, sy = y - camera.y + H / 2;
  return sx > -m && sx < W + m && sy > -m && sy < H + m;
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  ctx.fillStyle = '#070a12';
  ctx.fillRect(-20, -20, W + 40, H + 40);

  /* ground: deterministic hashed scatter (craters + stubble) */
  const gx0 = Math.floor((camera.x - W / 2) / 120), gx1 = Math.floor((camera.x + W / 2) / 120);
  const gy0 = Math.floor((camera.y - H / 2) / 120), gy1 = Math.floor((camera.y + H / 2) / 120);
  for (let cx = gx0; cx <= gx1; cx++) for (let cy = gy0; cy <= gy1; cy++) {
    let h = (cx * 374761393 + cy * 668265263) | 0;
    h = (h ^ (h >> 13)) * 1274126177 | 0;
    const fx = cx * 120 + (h & 63), fy = cy * 120 + ((h >> 6) & 63);
    const [sx, sy] = worldToScreen(fx, fy);
    if ((h >> 12 & 7) === 0) { // crater
      ctx.strokeStyle = 'rgba(120,110,90,.14)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, 14 + (h >> 15 & 15), 0, 7); ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(140,140,120,.10)';
      ctx.fillRect(sx, sy, 3, 3);
    }
  }
  /* arena boundary hint */
  {
    const [bx, by] = worldToScreen(0, 0);
    ctx.strokeStyle = 'rgba(255,214,106,.12)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(bx, by, ARENA_R, 0, 7); ctx.stroke();
  }

  if (state === 'menu') { drawMenuBg(); return; }

  /* gems + medkits */
  for (const g of gems.items) {
    if (!g.alive || !onScreen(g.x, g.y, 30)) continue;
    const [sx, sy] = worldToScreen(g.x, g.y);
    if (g.v < 0) { // medkit
      ctx.fillStyle = '#183020';
      ctx.fillRect(sx - 8, sy - 8, 16, 16);
      ctx.fillStyle = '#7dff9a';
      ctx.fillRect(sx - 5, sy - 1.5, 10, 3); ctx.fillRect(sx - 1.5, sy - 5, 3, 10);
    } else {
      const tw = 0.8 + 0.2 * Math.sin(anim * 5 + g.x);
      ctx.fillStyle = g.v >= 3 ? '#ffd76a' : '#9adcff';
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(0.785); ctx.scale(tw, tw);
      ctx.fillRect(-4, -4, 8, 8);
      ctx.restore();
    }
  }

  /* enemies: batched per type (one style change per type) */
  ctx.globalCompositeOperation = 'lighter';
  for (const type of ['rusher', 'shooter', 'heavy']) {
    const spec = ENEMY_TYPES[type];
    for (const e of enemies.items) {
      if (!e.alive || e.type !== type || !onScreen(e.x, e.y, 60)) continue;
      const [sx, sy] = worldToScreen(e.x, e.y);
      drawGlow(spec.glow, sx, sy, e.r * S * 2.6);
    }
  }
  ctx.globalCompositeOperation = 'source-over';
  for (const type of ['rusher', 'shooter', 'heavy']) {
    const spec = ENEMY_TYPES[type];
    ctx.fillStyle = spec.color;
    for (const e of enemies.items) {
      if (!e.alive || e.type !== type || !onScreen(e.x, e.y, 60)) continue;
      const [sx, sy] = worldToScreen(e.x, e.y);
      const r = e.r * S;
      if (e.hitT > 0) { ctx.fillStyle = '#fff'; }
      ctx.beginPath();
      if (type === 'rusher') { // darting wedge toward the player
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        ctx.save(); ctx.translate(sx, sy); ctx.rotate(a);
        ctx.moveTo(r, 0); ctx.lineTo(-r * 0.8, -r * 0.7); ctx.lineTo(-r * 0.4, 0); ctx.lineTo(-r * 0.8, r * 0.7);
        ctx.closePath(); ctx.fill(); ctx.restore();
      } else if (type === 'shooter') { // hooded ring
        ctx.arc(sx, sy, r, 0, 7); ctx.fill();
        ctx.fillStyle = '#070a12';
        ctx.beginPath(); ctx.arc(sx, sy, r * 0.45, 0, 7); ctx.fill();
      } else { // heavy: slab with shoulders
        ctx.fillRect(sx - r, sy - r * 0.8, r * 2, r * 1.6);
        ctx.fillRect(sx - r * 1.25, sy - r * 0.45, r * 0.35, r * 0.9);
        ctx.fillRect(sx + r * 0.9, sy - r * 0.45, r * 0.35, r * 0.9);
      }
      if (e.hitT > 0) ctx.fillStyle = spec.color;
      /* hp sliver for damaged non-rushers */
      if (type !== 'rusher' && e.hp < e.maxHp) {
        ctx.fillStyle = '#20242e';
        ctx.fillRect(sx - r, sy - r - 7, r * 2, 3);
        ctx.fillStyle = '#ffd76a';
        ctx.fillRect(sx - r, sy - r - 7, r * 2 * Math.max(0, e.hp / e.maxHp), 3);
        ctx.fillStyle = spec.color;
      }
    }
  }

  /* projectiles */
  ctx.globalCompositeOperation = 'lighter';
  for (const p of projs.items) {
    if (!p.alive || !onScreen(p.x, p.y, 30)) continue;
    const [sx, sy] = worldToScreen(p.x, p.y);
    if (p.hostile) {
      drawGlow('rgba(255,106,64,1)', sx, sy, p.r * S * 3);
      ctx.fillStyle = '#ffb89a';
    } else {
      drawGlow('rgba(255,233,184,1)', sx, sy, p.r * S * 2.4);
      ctx.fillStyle = '#fff6d8';
    }
    ctx.beginPath(); ctx.arc(sx, sy, p.r * S * 0.8, 0, 7); ctx.fill();
  }
  /* particles (batched by colour registry — small set) */
  for (const p of parts.items) {
    if (!p.alive || !onScreen(p.x, p.y, 20)) continue;
    const [sx, sy] = worldToScreen(p.x, p.y);
    drawGlow(p.color, sx, sy, p.r * 2.2 * Math.max(0, p.t / p.max));
  }
  ctx.globalCompositeOperation = 'source-over';

  /* player */
  if (state !== 'gameover') {
    const [sx, sy] = worldToScreen(player.x, player.y);
    const blink = run.inv > 0 && Math.floor(run.inv * 12) % 2 === 0;
    if (!blink) {
      ctx.globalCompositeOperation = 'lighter';
      drawGlow('rgba(255,214,106,1)', sx, sy, player.r * S * 3.2);
      ctx.globalCompositeOperation = 'source-over';
      const a = Math.atan2(player.aimY, player.aimX);
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(a);
      const r = player.r * S;
      ctx.fillStyle = '#ffe9b8';
      ctx.beginPath();
      ctx.moveTo(r * 1.1, 0); ctx.lineTo(-r * 0.7, -r * 0.75); ctx.lineTo(-r * 0.3, 0); ctx.lineTo(-r * 0.7, r * 0.75);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#8a5a20';
      ctx.fillRect(r * 0.2, -r * 0.16, r * 1.15, r * 0.32); // the rifle
      ctx.restore();
    }
  }

  /* popups */
  ctx.textAlign = 'center';
  for (const p of pops.items) {
    if (!p.alive) continue;
    const [sx, sy] = worldToScreen(p.x, p.y);
    ctx.globalAlpha = Math.min(1, p.t * 2.2);
    ctx.fillStyle = p.color;
    ctx.font = '800 ' + Math.round(13 * S) + 'px -apple-system, "Segoe UI", sans-serif';
    ctx.fillText(p.txt, sx, sy);
  }
  ctx.globalAlpha = 1;

  if (flash > 0) {
    ctx.fillStyle = 'rgba(255,80,60,' + flash * 0.4 + ')';
    ctx.fillRect(-20, -20, W + 40, H + 40);
  }
}

function drawMenuBg() {
  ctx.globalCompositeOperation = 'lighter';
  drawGlow('rgba(255,214,106,1)', W / 2 + Math.sin(anim * 0.6) * W * 0.2, H * 0.3, 60 * S);
  for (let i = 0; i < 4; i++) {
    const x = W / 2 + Math.sin(anim * 0.35 + i * 1.8) * W * 0.35;
    const y = H * 0.7 + Math.cos(anim * 0.3 + i * 2.2) * H * 0.15;
    drawGlow('rgba(122,143,208,1)', x, y, 34 * S);
  }
  ctx.globalCompositeOperation = 'source-over';
}

/* ================================================================== */
/*  HUD sync (throttled)                                              */
/* ================================================================== */
let hudHp = -1, hudXp = -1, hudLvl = -1, hudKills = -1, hudClock = '';
function tickHud() {
  const hpPct = Math.round(run.hp / run.maxHp * 100);
  if (hpPct !== hudHp) { hudHp = hpPct; document.getElementById('hpBar').style.width = hpPct + '%'; }
  const xpPct = Math.round(run.xp / run.xpNeed * 100);
  if (xpPct !== hudXp) { hudXp = xpPct; document.getElementById('xpBar').style.width = xpPct + '%'; }
  if (run.level !== hudLvl) { hudLvl = run.level; document.getElementById('lvlChip').textContent = 'LV ' + run.level; }
  if (run.kills !== hudKills) { hudKills = run.kills; document.getElementById('killsHud').textContent = run.kills; }
  const c = fmtTime(run.t);
  if (c !== hudClock) { hudClock = c; document.getElementById('clock').textContent = c; }
}

/* ================================================================== */
/*  Audio                                                             */
/* ================================================================== */
let actx = null, noiseBuf = null;
function unlockAudio() {
  if (!actx) {
    try {
      actx = new (window.AudioContext || window.webkitAudioContext)();
      noiseBuf = actx.createBuffer(1, actx.sampleRate * 0.5, actx.sampleRate);
      const ch = noiseBuf.getChannelData(0);
      for (let i = 0; i < ch.length; i++) ch[i] = Math.random() * 2 - 1;
    } catch (e) {}
  }
  if (actx && actx.state === 'suspended') actx.resume();
}
function tone(f0, f1, dur, type, vol, delay) {
  if (muted || !actx || actx.state !== 'running') return;
  try {
    const t0 = actx.currentTime + (delay || 0);
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(Math.max(f0, 1), t0);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t0); o.stop(t0 + dur + 0.03);
  } catch (e) {}
}
function boom(vol, dur) {
  if (muted || !actx || actx.state !== 'running' || !noiseBuf) return;
  try {
    const t0 = actx.currentTime;
    const src = actx.createBufferSource(); src.buffer = noiseBuf;
    const f = actx.createBiquadFilter(); f.type = 'lowpass';
    f.frequency.setValueAtTime(1800, t0);
    f.frequency.exponentialRampToValueAtTime(70, t0 + dur);
    const g = actx.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(f); f.connect(g); g.connect(actx.destination);
    src.start(t0); src.stop(t0 + dur);
  } catch (e) {}
}
let shotAlt = false;
const sfx = {
  shot()      { shotAlt = !shotAlt; tone(shotAlt ? 950 : 900, 300, 0.05, 'square', 0.04); },
  enemyShot() { tone(320, 210, 0.12, 'sawtooth', 0.05); },
  kill(big)   { big ? boom(0.22, 0.4) : tone(180, 60, 0.12, 'square', 0.08); },
  gem()       { tone(1050 + Math.min(run.level, 12) * 40, 1400, 0.05, 'sine', 0.05); },
  medkit()    { tone(520, 780, 0.14, 'triangle', 0.1); },
  hurt()      { tone(260, 70, 0.2, 'sawtooth', 0.13); },
  levelup()   { tone(660, 990, 0.12, 'triangle', 0.1); tone(990, 1480, 0.16, 'triangle', 0.1, 0.12); },
  deploy()    { tone(440, 880, 0.22, 'triangle', 0.09); },
  death()     { boom(0.3, 0.8); tone(400, 42, 1.0, 'sawtooth', 0.13); },
};
function vibrate(p) { try { navigator.vibrate && navigator.vibrate(p); } catch (e) {} }

/* ================================================================== */
/*  Input                                                             */
/* ================================================================== */
const stage = document.getElementById('stage');
stage.addEventListener('pointerdown', e => {
  e.preventDefault(); unlockAudio();
  if (state === 'paused') { setState('playing'); return; }
  ptr.down = true; ptr.id = e.pointerId; ptr.x = e.clientX; ptr.y = e.clientY;
});
stage.addEventListener('pointermove', e => {
  if (ptr.down && e.pointerId === ptr.id) { ptr.x = e.clientX; ptr.y = e.clientY; }
});
function ptrUp(e) { if (e.pointerId === ptr.id) { ptr.down = false; ptr.id = null; } }
stage.addEventListener('pointerup', ptrUp);
stage.addEventListener('pointercancel', ptrUp);

document.getElementById('btnDeploy').addEventListener('click', () => { unlockAudio(); startRun(); });
document.getElementById('btnRetry').addEventListener('click', () => { unlockAudio(); startRun(); });
document.getElementById('btnMenu').addEventListener('click', () => setState('menu'));
document.getElementById('pauseBtn').addEventListener('click', e => {
  e.stopPropagation();
  if (state === 'playing') setState('paused');
});
document.getElementById('muteBtn').addEventListener('click', e => {
  e.stopPropagation(); unlockAudio();
  muted = !muted; store.set('muted', muted);
  e.currentTarget.innerHTML = muted ? '&#128263;' : '&#128266;';
});
document.getElementById('muteBtn').innerHTML = muted ? '&#128263;' : '&#128266;';
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'playing') setState('paused');
});

/* ================================================================== */
/*  Main loop                                                         */
/* ================================================================== */
let last = performance.now();
const frameLog = []; // stage 5 perf audit
function frame(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  if (frameLog.length < 40000 && state === 'playing') frameLog.push(ts - last);
  last = ts;
  if (state !== 'paused') update(dt);
  tickHud();
  draw();
  requestAnimationFrame(frame);
}

/* debug/testing hook */
window.__lastflare = {
  snap: () => ({
    state, t: run.t, hp: run.hp, maxHp: run.maxHp, kills: run.kills,
    level: run.level, xp: run.xp, xpNeed: run.xpNeed, salvage: run.salvage,
    wave: run.wave, lull: run.lull, inv: run.inv,
    enemies: enemies.count, projs: projs.count, parts: parts.count, gems: gems.count,
    player: { x: player.x, y: player.y },
    timeToFirstKill: run.timeToFirstKill,
    weapons: weapons.map(w => ({ id: w.id, lvl: w.lvl })),
  }),
  hurt: n => hurtPlayer(n || 25),
  spawn: (type, n) => { for (let i = 0; i < (n || 1); i++) spawnEnemy(type || 'rusher'); },
  gainXp: n => gainXp(n || 10),
  killAll: () => { for (const e of enemies.items) if (e.alive) killEnemy(e); },
  frameTimes: () => frameLog.slice(),
  enemyList: () => enemies.items.filter(e => e.alive).map(e => ({ x: e.x, y: e.y, type: e.type, hp: e.hp })),
  gemList: () => gems.items.filter(g => g.alive).map(g => ({ x: g.x, y: g.y, v: g.v })),
};

setState('menu');
requestAnimationFrame(frame);
</script>
