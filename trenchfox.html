<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0b12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>TRENCHFOX</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
  html, body {
    height: 100%;
    background: #0a0b12;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    font-family: "Courier New", ui-monospace, Menlo, monospace;
  }
  #app {
    height: 100dvh;
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    padding: calc(env(safe-area-inset-top) + 4px) env(safe-area-inset-right)
             calc(env(safe-area-inset-bottom) + 4px) env(safe-area-inset-left);
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 14px 6px;
  }
  .score-block .lbl { font-size: 10px; letter-spacing: 2px; color: #8a8aa0; }
  .score-block .val { font-size: 20px; font-weight: bold; color: #fff; }
  .btns { display: flex; gap: 8px; }
  .btns button {
    width: 42px; height: 38px;
    background: #101018; border: 1px solid #2a2a4a; border-radius: 10px;
    color: #ccd; font-size: 16px; line-height: 1;
  }
  .btns button:active { background: #26264a; }
  #stage {
    flex: 1; min-height: 0; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  canvas { display: block; }
  #overlay {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; gap: 14px;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(0,0,0,.62);
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #ovTitle {
    color: #ffe9b0; font-size: 32px; font-weight: bold; letter-spacing: 5px;
    text-shadow: 0 0 22px rgba(255,220,140,.45);
  }
  #overlay.over #ovTitle { color: #ff3b30; text-shadow: 0 0 22px rgba(255,59,48,.45); }
  #ovMsg { color: #aab; font-size: 14px; line-height: 1.7; white-space: pre-line; }
  .pulse { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 16px 2px; color: #8a8aa0; font-size: 13px; letter-spacing: 2px;
  }
  .fox-life {
    width: 0; height: 0;
    display: inline-block; margin-right: 8px; vertical-align: middle;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 13px solid #c96f2f;
    filter: drop-shadow(0 0 4px rgba(201,111,47,.6));
  }
  #dpad {
    display: none;
    grid-template-areas: ". up ." "left . right" ". down .";
    gap: 6px; justify-content: center; padding: 6px 0 8px;
  }
  @media (pointer: coarse) { #dpad { display: grid; } }
  #dpad button {
    width: 66px; height: 48px;
    background: #101018; border: 1px solid #26264a; border-radius: 12px;
    color: #ccd; font-size: 18px;
  }
  #dpad button:active { background: #2c2c55; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="score-block"><div class="lbl">SCORE</div><div class="val" id="score">0</div></div>
    <div class="score-block" style="text-align:center"><div class="lbl">HIGH</div><div class="val" id="high">0</div></div>
    <div class="btns">
      <button id="btnSound" aria-label="Toggle sound">&#128266;</button>
      <button id="btnPause" aria-label="Pause">&#10074;&#10074;</button>
    </div>
  </header>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="overlay" class="hidden">
      <div id="ovTitle"></div>
      <div id="ovMsg"></div>
    </div>
  </div>
  <footer>
    <div id="lives"></div>
    <div id="level">SECTOR 1</div>
  </footer>
  <div id="dpad">
    <button style="grid-area:up"    data-dir="up">&#9650;</button>
    <button style="grid-area:left"  data-dir="left">&#9664;</button>
    <button style="grid-area:right" data-dir="right">&#9654;</button>
    <button style="grid-area:down"  data-dir="down">&#9660;</button>
  </div>
</div>
<script>
'use strict';

/* ------------------------------------------------------------------ */
/*  Maze                                                              */
/* ------------------------------------------------------------------ */
const COLS = 28, ROWS = 31;
// Three original trench networks, generated and validated (connectivity,
// dugout, crawl-through, spawn). '#' parapet, '.' dispatch, 'o' signal
// flare, '-' dugout gate, ' ' open trench.
const MAZES = [
[
  "############################",
  "#o . .#. .#. .. .#. .#. . o#",
  "# ### # # # #  # # # # ### #",
  "#. .#. . . .#..#. . . .#. .#",
  "# . . ### ###  ### ### . . #",
  "#. .#. . . . .. . . . .#. .#",
  "# # # .## # .  . # ##. # # #",
  "#.#.#. .#.#.#..#.#.#. .#.#.#",
  "### # . # # .  . # # . # ###",
  "#. .#.#.#.#. .. .#.#.#.#. .#",
  "# # # # # . .##. . # # # # #",
  "#. . .#.            .#. . .#",
  "##.#. # . ###--### . # .#.##",
  "#. . . .  #      #  . . . .#",
  "      . . #      # . .      ",
  "#.#. . .  #      #  . . .#.#",
  "# # . # . ######## . # . # #",
  "#. .#. .            . .#. .#",
  "####### ##.######.## #######",
  "#. . . . . . .. . . . . . .#",
  "# ##### # # #  # # # ##### #",
  "#. .#. . .#. .. .#. . .#. .#",
  "# # # . # . .  . . # . # # #",
  "#. . .#. . .    . . .#. . .#",
  "# o ### ### .##. ### ### o #",
  "#.#. .#. .#. .. .#. .#. .#.#",
  "# # # ### # #  # # ### # # #",
  "#.#. .#. .#.#..#.#. .#. .#.#",
  "# # # # ### .  . ### # # # #",
  "#. .#. . . . .. . . . .#. .#",
  "############################"
],
[
  "############################",
  "#o . . .#. . .. . .#. . . o#",
  "# ##### # # #  # # # ##### #",
  "#.#. .#.#.#. .. .#.#.#. .#.#",
  "# . # # #####  ##### # # . #",
  "#. .#.#. . . .. . . .#.#. .#",
  "##.## ##.#. #  # .#.## ##.##",
  "#. . .#. .#.#..#.#. .#. . .#",
  "# .## # # # .  . # # # ##. #",
  "#.#. . . . .#..#. . . . .#.#",
  "# . ######.##  ##.###### . #",
  "#.#. . .            . . .#.#",
  "# .#. ##. ###--### .## .#. #",
  "#. .#. .  #      #  . .#. .#",
  "      . . #      # . .      ",
  "#.#. .#.  #      #  .#. .#.#",
  "####. # . ######## . # .####",
  "#. . . .            . . . .#",
  "# # .#. . ###  ### . .#. # #",
  "#. .#. .#. .#..#. .#. .#. .#",
  "# . ### # # #  # # # ### . #",
  "#.#.#. . . .#..#. . . .#.#.#",
  "# # # . # . #### . # . # # #",
  "#.#. .#.#. .    . .#.#. .#.#",
  "# o## # # # #  # # # # ##o #",
  "#. . . .#. . .. . .#. . . .#",
  "# # # # # # #### # # # # # #",
  "#.#. .#. .#. .. .#. .#. .#.#",
  "# .## # . ###  ### . # ##. #",
  "#. . . . . . .. . . . . . .#",
  "############################"
],
[
  "############################",
  "#o . . . . . .. . . . . . o#",
  "# ####### # #  # # ####### #",
  "#. . . .#. . .. . .#. . . .#",
  "##### # ##. #  # .## # #####",
  "#. .#.#. . . .. . . .#.#. .#",
  "# # # # .#. #### .#. # # # #",
  "#.#.#. . . . .. . . . .#.#.#",
  "# # # .#.####  ####.#. # # #",
  "#. .#. . . .#..#. . . .#. .#",
  "# # ### . ###  ### . ### # #",
  "#.#.#. .            . .#.#.#",
  "# # # .#. ###--### .#. # # #",
  "#. . . .  #      #  . . . .#",
  "      . . #      # . .      ",
  "#. . .#.  #      #  .#. . .#",
  "# . . # . ######## . # . . #",
  "#. .#. .            . .#. .#",
  "# .######## .  . ########. #",
  "#. .#.#. .#.#..#.#. .#.#. .#",
  "### # # . # .##. # . # # ###",
  "#. .#. . .#. .. .#. . .#. .#",
  "# .#### # # #  # # # ####. #",
  "#. .#. . . .    . . . .#. .#",
  "### # # # . #  # . # # # ###",
  "#o#.#.#.#. .#..#. .#.#.#.#o#",
  "# # # . . . .  . . . . # # #",
  "#.#.#.#. . .#..#. . .#.#.#.#",
  "# # # # # . #  # . # # # # #",
  "#. . .#. . . .. . . .#. . .#",
  "############################"
],
];
let MAP = MAZES[0];
const TUNNEL_ROW = 14;
const DOOR = { x: 13.5, y: 11.5 };   // tile centre just above the dugout gate
const HOUSE_Y = 14.5;                // y of the bunks inside the dugout
const FRUIT_POS = { x: 13.5, y: 17.5 };
const FRUIT_PTS = [100, 300, 500, 700, 1000, 2000, 3000, 5000];

const DIRS = {
  up:    { x: 0, y: -1 },
  down:  { x: 0, y: 1 },
  left:  { x: -1, y: 0 },
  right: { x: 1, y: 0 },
};
const DIR_ORDER = [DIRS.up, DIRS.left, DIRS.down, DIRS.right]; // fixed tie-break order

function passable(tx, ty) {
  if (ty === TUNNEL_ROW && (tx < 0 || tx >= COLS)) return true; // tunnel
  const row = MAP[ty];
  if (!row) return false;
  const ch = row[tx];
  return ch !== undefined && ch !== '#' && ch !== '-';
}
function canGo(cx, cy, d) { return passable(cx + d.x, cy + d.y); }

/* ------------------------------------------------------------------ */
/*  State                                                             */
/* ------------------------------------------------------------------ */
let state = 'start';   // start | ready | playing | paused | dying | levelclear | gameover
let stateTimer = 0;
let score = 0, high = 0, lives = 3, level = 1;
let extraLifeGiven = false;
let grid = [], dots = 0, dotsEaten = 0;
let levelTime = 0, freeze = 0, anim = 0;
let frightTimer = 0, ghostChain = 0;
let fruitTimer = 0;
let popups = [];
let muted = false;
let vig = 0; // near-death vignette intensity (final life)
let missionT = 0;

const SCHEDULE = [
  [7, 'scatter'], [20, 'chase'], [7, 'scatter'], [20, 'chase'],
  [5, 'scatter'], [20, 'chase'], [5, 'scatter'], [Infinity, 'chase'],
];
let modeIdx = 0, modeTimer = 0;
function currentMode() { return SCHEDULE[modeIdx][1]; }

try {
  high = parseInt(localStorage.getItem('trenchfox-high') || '0', 10) || 0;
  muted = localStorage.getItem('trenchfox-muted') === '1';
} catch (e) {}

/* ---- shared arcade rank/XP (arcade-* keys; one-time migration of the
   rank XP that originated in LAST FLARE's lastflare-xp) ---- */
const ARCADE_RANKS = [
  ['Private', 0], ['Corporal', 300], ['Sergeant', 800], ['Lieutenant', 1600],
  ['Captain', 3000], ['Major', 5000], ['Colonel', 8000], ['Field Marshal', 12000],
];
const arcade = {
  get xp() { try { const v = localStorage.getItem('arcade-xp'); return v === null ? 0 : (JSON.parse(v) || 0); } catch (e) { return 0; } },
  set xp(v) { try { localStorage.setItem('arcade-xp', JSON.stringify(v)); } catch (e) {} },
  migrate() {
    try {
      if (localStorage.getItem('arcade-xp') !== null) return;
      const lf = JSON.parse(localStorage.getItem('lastflare-xp'));
      if (typeof lf === 'number' && lf > 0) this.xp = lf;
    } catch (e) {}
  },
  add(n) { const v = this.xp + Math.max(0, Math.round(n)); this.xp = v; return v; },
  rank() {
    let r = ARCADE_RANKS[0][0];
    for (const [name, need] of ARCADE_RANKS) if (this.xp >= need) r = name;
    return r;
  },
};
arcade.migrate();

/* ------------------------------------------------------------------ */
/*  Entities                                                          */
/* ------------------------------------------------------------------ */
const pac = {
  x: 13.5, y: 23.5, dir: null, desired: null, lastDir: DIRS.left,
  decide() {
    const cx = Math.floor(this.x), cy = Math.floor(this.y);
    if (this.desired && canGo(cx, cy, this.desired)) this.dir = this.desired;
    else if (!(this.dir && canGo(cx, cy, this.dir))) this.dir = null;
    if (this.dir) this.lastDir = this.dir;
  },
};

function makeGhost(name, color, scatter, homeX, release) {
  return {
    name, color, scatter,
    homeX, releaseAt: release,
    x: homeX, y: HOUSE_Y,
    dir: null, state: 'house', // house | leaving | active | eyes | entering
    fright: false, bob: Math.random() * 6,
    decide() { ghostDecide(this); },
  };
}
const ghosts = [
  makeGhost('hound',  '#b09a6e', { x: 25, y: 0 },  13.5, 0),   // direct chase
  makeGhost('viper',  '#7fae5a', { x: 2,  y: 0 },  13.5, 1.0), // strikes ahead
  makeGhost('shadow', '#7286b0', { x: 27, y: 30 }, 11.5, 4.0), // predictive flank
  makeGhost('stray',  '#c9a35a', { x: 0,  y: 30 }, 15.5, 7.5), // erratic
];

function chaseTarget(g) {
  const px = Math.floor(pac.x), py = Math.floor(pac.y);
  const pd = pac.lastDir;
  switch (g.name) {
    case 'hound': return { x: px, y: py };
    case 'viper':  return { x: px + pd.x * 4, y: py + pd.y * 4 };
    case 'shadow': {
      const b = ghosts[0];
      const ax = px + pd.x * 2, ay = py + pd.y * 2;
      return { x: ax * 2 - Math.floor(b.x), y: ay * 2 - Math.floor(b.y) };
    }
    case 'stray': {
      // erratic: lurches at the Fox, then wanders somewhere random
      if (Math.random() < 0.45) {
        return { x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0 };
      }
      return { x: px, y: py };
    }
  }
}

function ghostDecide(g) {
  const cx = Math.floor(g.x), cy = Math.floor(g.y);
  if (g.state === 'eyes' && cx === 13 && cy === 11) {
    // reached the door: slide down into the house
    g.x = DOOR.x; g.y = DOOR.y; g.dir = null; g.state = 'entering';
    return;
  }
  const opp = g.dir ? { x: -g.dir.x, y: -g.dir.y } : null;
  let target = null;
  if (g.state === 'eyes') target = { x: 13, y: 11 };
  else if (!g.fright) target = currentMode() === 'scatter' ? g.scatter : chaseTarget(g);

  let best = null, bestD = Infinity;
  const options = [];
  for (const d of DIR_ORDER) {
    if (opp && d.x === opp.x && d.y === opp.y) continue;
    if (!canGo(cx, cy, d)) continue;
    options.push(d);
    if (target) {
      const dd = (cx + d.x - target.x) ** 2 + (cy + d.y - target.y) ** 2;
      if (dd < bestD) { bestD = dd; best = d; }
    }
  }
  if (!options.length) { g.dir = opp; return; }
  g.dir = target ? best : options[(Math.random() * options.length) | 0];
}

/* Shared grid movement: advance `dist` tiles along dir, deciding at centres */
function stepEntity(e, dist) {
  let guard = 0;
  while (dist > 1e-6 && guard++ < 10) {
    const atCX = Math.abs(e.x - Math.floor(e.x) - 0.5) < 1e-3;
    const atCY = Math.abs(e.y - Math.floor(e.y) - 0.5) < 1e-3;
    if (atCX && atCY) e.decide();
    if (!e.dir) return;
    const horiz = e.dir.x !== 0;
    const pos = horiz ? e.x : e.y;
    const sign = horiz ? e.dir.x : e.dir.y;
    const next = sign > 0
      ? Math.floor(pos - 0.5 + 1e-6) + 1.5
      : Math.ceil(pos + 0.5 - 1e-6) - 1.5;
    const d = Math.abs(next - pos);
    if (dist < d) {
      if (horiz) e.x += sign * dist; else e.y += sign * dist;
      return;
    }
    if (horiz) e.x = next; else e.y = next;
    dist -= d;
    if (e.x < 0) e.x += COLS;             // tunnel wrap
    else if (e.x >= COLS) e.x -= COLS;
  }
}

/* ------------------------------------------------------------------ */
/*  Speeds & timing                                                   */
/* ------------------------------------------------------------------ */
function pacSpeed() { return 6.8 * (1 + Math.min(level - 1, 6) * 0.04); }
function ghostSpeed(g) {
  const base = pacSpeed() * 0.92;
  if (g.state === 'eyes') return base * 1.9;
  if (g.fright) return base * 0.55;
  const inTunnel = Math.floor(g.y) === TUNNEL_ROW && (g.x < 6.5 || g.x > 21.5);
  if (inTunnel) return base * 0.5;
  return base;
}
function frightDuration() { return Math.max(1.5, 7 - (level - 1) * 0.8); }

/* ------------------------------------------------------------------ */
/*  Level / actor setup                                               */
/* ------------------------------------------------------------------ */
function buildLevel() {
  MAP = MAZES[(level - 1) % MAZES.length]; // sectors rotate through the trench networks
  grid = []; dots = 0; dotsEaten = 0;
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) {
      const ch = MAP[r][c];
      if (ch === '.' || ch === 'o') { row.push(ch); dots++; }
      else row.push(null);
    }
    grid.push(row);
  }
  if (canvas.width) rebuildWalls();
}

function resetActors() {
  pac.x = 13.5; pac.y = 23.5;
  pac.dir = null; pac.desired = null; pac.lastDir = DIRS.left;
  for (const g of ghosts) {
    g.fright = false;
    if (g.name === 'hound') {
      g.state = 'active'; g.x = DOOR.x; g.y = DOOR.y; g.dir = DIRS.left;
    } else {
      g.state = 'house'; g.x = g.homeX; g.y = HOUSE_Y; g.dir = null;
    }
  }
  ghosts[1].releaseAt = 1.0; ghosts[2].releaseAt = 4.0; ghosts[3].releaseAt = 7.5;
  levelTime = 0; freeze = 0; frightTimer = 0; ghostChain = 0;
  modeIdx = 0; modeTimer = 0;
  fruitTimer = 0; popups = [];
}

function setState(s, t) {
  state = s; stateTimer = t || 0;
  updateOverlay(); updateHud();
}

function newGame() {
  score = 0; lives = 3; level = 1; extraLifeGiven = false;
  runRouts = 0; maxFlareChain = 0; runDots = 0; missionT = 0;
  rollMissions();
  buildLevel(); resetActors();
  setState('ready', 2.0);
  sfx.ready();
}

/* ------------------------------------------------------------------ */
/*  Gameplay events                                                   */
/* ------------------------------------------------------------------ */
function addScore(n) {
  score += n;
  if (!extraLifeGiven && score >= 10000) {
    extraLifeGiven = true; lives++;
    popups.push({ x: pac.x, y: pac.y - 1, text: '1UP', t: 1.2, color: '#7dff7d' });
    sfx.life();
  }
  if (score > high) {
    high = score;
    try { localStorage.setItem('trenchfox-high', String(high)); } catch (e) {}
  }
}

function eatPellet(ch) {
  dotsEaten++; dots--; runDots++;
  if (ch === 'o') {
    addScore(50);
    igniteFlare();
  } else {
    addScore(10);
    sfx.tick();
  }
  if (dotsEaten === 70 || dotsEaten === 170) fruitTimer = 9;
  if (dots <= 0) { setState('levelclear', 2.0); sfx.clear(); }
}

// A signal flare goes up: hunters are exposed and can be run down
function igniteFlare() {
  frightTimer = frightDuration(); ghostChain = 0;
  for (const g of ghosts) {
    if (g.state === 'eyes' || g.state === 'entering') continue;
    g.fright = true;
    if (g.state === 'active' && g.dir) g.dir = { x: -g.dir.x, y: -g.dir.y };
  }
  sfx.flare();
}

function eatGhost(g) {
  const pts = 200 << Math.min(ghostChain, 3);
  ghostChain++;
  runRouts++;
  maxFlareChain = Math.max(maxFlareChain, ghostChain);
  addScore(pts);
  g.state = 'eyes'; g.fright = false;
  popups.push({ x: g.x, y: g.y, text: String(pts), t: 1.0, color: '#4dd6ff' });
  if (ghostChain >= 2) {
    popups.push({
      x: g.x, y: g.y - 1.2, t: 1.1, color: '#ffd23f',
      text: ghostChain >= 4 ? 'FULL ROUT!' : 'ROUTED ×' + ghostChain + '!',
    });
  }
  freeze = 0.4;
  sfx.rundown();
}

let deathFxDone = false;
function killPac() {
  setState('dying', 2.6); // 0.5s frozen silence, then the death sequence
  deathFxDone = false;
}

/* ---- session missions (ported from LAST FLARE): three per run, themed
   for the trenches, rotating on the daily seed, paying arcade XP ---- */
function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hashStr(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
let runRouts = 0, maxFlareChain = 0, runDots = 0; // per-run mission counters
const MISSION_POOL = [
  { id: 'routs',    name: 'Rout {n} hunters',        ns: [3, 6, 10],         check: () => runRouts,      bonus: 25 },
  { id: 'oneflare', name: 'Rout {n} with one flare', ns: [2, 3, 4],          check: () => maxFlareChain, bonus: 35 },
  { id: 'dots',     name: 'Grab {n} dispatches',     ns: [80, 150, 220],     check: () => runDots,       bonus: 25 },
  { id: 'sector',   name: 'Reach sector {n}',        ns: [2, 3],             check: () => level,         bonus: 40 },
  { id: 'score',    name: 'Score {n}',               ns: [1500, 3000, 6000], check: () => score,         bonus: 30 },
];
let missions = [];
function rollMissions(dateStr) {
  const rng = mulberry32(hashStr('trenchfox-missions-' + (dateStr || todayKey())));
  const idx = [0, 1, 2, 3, 4];
  missions = [];
  for (let i = 0; i < 3; i++) {
    const m = MISSION_POOL[idx.splice((rng() * idx.length) | 0, 1)[0]];
    const n = m.ns[(rng() * m.ns.length) | 0];
    missions.push({ id: m.id, n, check: m.check, bonus: m.bonus, done: false,
                    name: m.name.replace('{n}', n) });
  }
}
function tickMissions() {
  for (const m of missions) {
    if (!m.done && m.check() >= m.n) {
      m.done = true;
      arcade.add(m.bonus);
      popups.push({ x: pac.x, y: pac.y - 1.4, text: 'MISSION ✓ +' + m.bonus + ' XP', t: 1.4, color: '#7dff9a' });
      sfx.life();
    }
  }
}
function missionHtml() {
  return missions.map(m =>
    '<span style="color:' + (m.done ? '#7dff9a' : '#8a8fb8') + '">' +
    (m.done ? '✔ ' : '◦ ') + m.name + ' (+' + m.bonus + ' XP)</span>'
  ).join('<br>');
}

let lastXpGain = 0;
function gameOver() {
  // arcade XP: score already folds in dispatches, routs and sector bonuses
  lastXpGain = Math.max(1, Math.round(score / 25));
  arcade.add(lastXpGain);
  setState('gameover', 0);
}

/* ------------------------------------------------------------------ */
/*  Update                                                            */
/* ------------------------------------------------------------------ */
function update(dt) {
  const deathFreeze = state === 'dying' && stateTimer > 2.1;
  if (!deathFreeze) {
    anim += dt;
    for (const p of popups) p.t -= dt;
    popups = popups.filter(p => p.t > 0);
  }
  // near-death vignette eases in while running on the final life
  const vigOn = lives === 0 && state !== 'gameover' && state !== 'start';
  vig += ((vigOn ? 1 : 0) - vig) * Math.min(1, dt * 3);

  if (state === 'ready') {
    stateTimer -= dt;
    if (stateTimer <= 0) { setState('playing'); pac.dir = DIRS.left; }
    return;
  }
  if (state === 'dying') {
    stateTimer -= dt;
    if (!deathFxDone && stateTimer <= 2.1) {
      deathFxDone = true;
      sfx.death();
      try { navigator.vibrate && navigator.vibrate(120); } catch (e) {}
    }
    if (stateTimer <= 0) {
      lives--;
      if (lives < 0) { gameOver(); return; }
      resetActors(); setState('ready', 1.6); updateHud();
    }
    return;
  }
  if (state === 'levelclear') {
    stateTimer -= dt;
    if (stateTimer <= 0) {
      level++;
      buildLevel(); resetActors();
      setState('ready', 2.0); updateHud();
    }
    return;
  }
  if (state !== 'playing') return;

  if (freeze > 0) { freeze -= dt; if (freeze > 0) return; }

  levelTime += dt;
  missionT += dt;
  if (missionT >= 1) { missionT = 0; tickMissions(); }

  // scatter/chase schedule (paused while frightened)
  if (frightTimer > 0) {
    frightTimer -= dt;
    if (frightTimer <= 0) { for (const g of ghosts) g.fright = false; }
  } else if (modeIdx < SCHEDULE.length - 1) {
    modeTimer += dt;
    if (modeTimer >= SCHEDULE[modeIdx][0]) {
      modeTimer = 0; modeIdx++;
      for (const g of ghosts) {
        if (g.state === 'active' && g.dir) g.dir = { x: -g.dir.x, y: -g.dir.y };
      }
    }
  }

  if (fruitTimer > 0) fruitTimer -= dt;

  // the Fox
  stepEntity(pac, pacSpeed() * dt);
  const tx = Math.floor(pac.x), ty = Math.floor(pac.y);
  const ch = grid[ty] && grid[ty][tx];
  if (ch) { grid[ty][tx] = null; eatPellet(ch); }
  if (state !== 'playing') return; // level may have just been cleared

  if (fruitTimer > 0 &&
      Math.abs(pac.x - FRUIT_POS.x) < 0.7 && Math.abs(pac.y - FRUIT_POS.y) < 0.7) {
    const pts = FRUIT_PTS[Math.min(level - 1, FRUIT_PTS.length - 1)];
    addScore(pts); fruitTimer = 0;
    popups.push({ x: FRUIT_POS.x, y: FRUIT_POS.y, text: String(pts), t: 1.0, color: '#ff9ecd' });
    sfx.fruit();
  }

  // Ghosts
  for (const g of ghosts) {
    if (g.state === 'house') {
      g.bob += dt;
      g.y = HOUSE_Y + Math.sin(g.bob * 4) * 0.18;
      if (levelTime >= g.releaseAt) { g.state = 'leaving'; }
    } else if (g.state === 'leaving') {
      const sp = 3.0 * dt;
      if (Math.abs(g.x - DOOR.x) > 0.02) {
        g.x += Math.max(-sp, Math.min(sp, DOOR.x - g.x));
      } else {
        g.x = DOOR.x; g.y -= sp;
        if (g.y <= DOOR.y) { g.y = DOOR.y; g.state = 'active'; g.dir = DIRS.left; }
      }
    } else if (g.state === 'entering') {
      g.y += 5.0 * dt;
      if (g.y >= HOUSE_Y) {
        g.y = HOUSE_Y; g.state = 'house';
        g.bob = 0; g.releaseAt = levelTime + 0.6;
      }
    } else {
      stepEntity(g, ghostSpeed(g) * dt);
    }
  }

  // Collisions
  for (const g of ghosts) {
    if (g.state !== 'active') continue;
    if (Math.abs(g.x - pac.x) < 0.65 && Math.abs(g.y - pac.y) < 0.65) {
      if (g.fright) eatGhost(g);
      else { killPac(); return; }
    }
  }
}

/* ------------------------------------------------------------------ */
/*  Rendering                                                         */
/* ------------------------------------------------------------------ */
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let T = 16; // tile size in device pixels
let wallsMud = null, wallsFlare = null, flareGlow = null;
const WALL_MUD = ['#5c4a2e', '#8a7248'];     // sandbag parapets
const WALL_LIT = ['#e8dcae', '#fff6d8'];     // flare-washed
function rebuildWalls() {
  wallsMud = buildWallCanvas(WALL_MUD);
  wallsFlare = buildWallCanvas(WALL_LIT);
}
function makeFlareGlow() {
  const c = document.createElement('canvas');
  c.width = c.height = 96;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(48, 48, 0, 48, 48, 48);
  grad.addColorStop(0, 'rgba(255,246,214,1)');
  grad.addColorStop(0.3, 'rgba(255,220,140,.55)');
  grad.addColorStop(1, 'rgba(255,220,140,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 96, 96);
  return c;
}

function buildWallCanvas(color) {
  const c = document.createElement('canvas');
  c.width = canvas.width; c.height = canvas.height;
  const g = c.getContext('2d');
  g.lineCap = 'round'; g.lineJoin = 'round';
  const seg = [];
  const isWall = (cc, rr) => {
    if (rr < 0 || rr >= ROWS || cc < 0 || cc >= COLS) return true;
    return MAP[rr][cc] === '#';
  };
  for (let r = 0; r < ROWS; r++) {
    for (let cc = 0; cc < COLS; cc++) {
      if (MAP[r][cc] !== '#') continue;
      const x = cc * T, y = r * T;
      if (!isWall(cc, r - 1)) seg.push([x, y, x + T, y]);
      if (!isWall(cc, r + 1)) seg.push([x, y + T, x + T, y + T]);
      if (!isWall(cc - 1, r)) seg.push([x, y, x, y + T]);
      if (!isWall(cc + 1, r)) seg.push([x + T, y, x + T, y + T]);
    }
  }
  const stroke = (w, col) => {
    g.strokeStyle = col; g.lineWidth = w;
    g.beginPath();
    for (const s of seg) { g.moveTo(s[0], s[1]); g.lineTo(s[2], s[3]); }
    g.stroke();
  };
  stroke(T * 0.18, color[0]);
  stroke(T * 0.06, color[1]);
  // dugout gate timbers
  g.fillStyle = '#a8834e';
  g.fillRect(13 * T, 12 * T + T * 0.4, 2 * T, T * 0.22);
  return c;
}

function resize() {
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  if (rect.width < 10 || rect.height < 10) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const scale = Math.min(rect.width / COLS, rect.height / ROWS);
  canvas.style.width = (COLS * scale) + 'px';
  canvas.style.height = (ROWS * scale) + 'px';
  canvas.width = Math.round(COLS * scale * dpr);
  canvas.height = Math.round(ROWS * scale * dpr);
  T = canvas.width / COLS;
  rebuildWalls();
  flareGlow = makeFlareGlow();
}

function drawFox() {
  // The Fox, seen from above: sleek body, forward-pointing head, brush tail
  let scale = 1, alpha = 1, spin = 0;
  if (state === 'dying') {
    const p = 2.6 - stateTimer;
    if (p > 1.0) {
      const q = Math.min(1, (p - 1.0) / 1.2);
      scale = 1 - q; spin = q * 5; alpha = Math.max(0, 1 - q * 1.1);
      if (q >= 1) return;
    }
  }
  const d = pac.lastDir;
  const ang = Math.atan2(d.y, d.x);
  const cx = pac.x * T, cy = pac.y * T, r = T * 0.66;
  const bob = state === 'playing' ? Math.sin(anim * 11) * r * 0.07 : 0;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ang + spin);
  ctx.scale(Math.max(scale, 0.02), Math.max(scale, 0.02));
  ctx.globalAlpha = alpha;
  // brush tail with pale tip
  ctx.fillStyle = '#a34f1f';
  ctx.beginPath();
  ctx.moveTo(-r * 0.7, 0);
  ctx.quadraticCurveTo(-r * 1.35, -r * 0.35 + bob, -r * 1.65, 0);
  ctx.quadraticCurveTo(-r * 1.35, r * 0.35 + bob, -r * 0.7, 0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffe9d0';
  ctx.beginPath(); ctx.arc(-r * 1.5, bob * 0.5, r * 0.15, 0, 7); ctx.fill();
  // body
  ctx.fillStyle = '#c96f2f';
  ctx.beginPath(); ctx.ellipse(-r * 0.1, bob * 0.4, r * 0.8, r * 0.5, 0, 0, 7); ctx.fill();
  // head wedge pointing forward + ears both sides (top-down)
  ctx.beginPath();
  ctx.moveTo(r * 1.05, 0);
  ctx.lineTo(r * 0.2, -r * 0.48);
  ctx.lineTo(r * 0.2, r * 0.48);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(r * 0.28, -r * 0.42); ctx.lineTo(r * 0.46, -r * 0.88); ctx.lineTo(r * 0.62, -r * 0.36);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(r * 0.28, r * 0.42); ctx.lineTo(r * 0.46, r * 0.88); ctx.lineTo(r * 0.62, r * 0.36);
  ctx.closePath(); ctx.fill();
  // back stripe + nose
  ctx.fillStyle = '#8a3f16';
  ctx.beginPath(); ctx.ellipse(-r * 0.2, bob * 0.4, r * 0.45, r * 0.18, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#22150c';
  ctx.beginPath(); ctx.arc(r * 0.98, 0, r * 0.1, 0, 7); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawHunter(g) {
  const cx = g.x * T, cy = g.y * T, r = T * 0.62;
  if (g.state === 'eyes' || g.state === 'entering') {
    // routed: a wisp of smoke slinking back to the dugout
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = '#9aa0a8';
    for (let i = 0; i < 3; i++) {
      const ph = anim * 6 + i * 2.1;
      ctx.beginPath();
      ctx.arc(cx + Math.sin(ph) * r * 0.25, cy + (1 - i) * r * 0.26, r * (0.36 - i * 0.08), 0, 7);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    return;
  }
  const fr = g.fright;
  const flick = fr && frightTimer < 2 && Math.floor(frightTimer * 4) % 2 === 1;
  const col = fr ? (flick ? '#ffffff' : '#e8e3cd') : g.color;
  const dk = fr ? '#8a8570' : '#22150c';
  const d = g.dir || DIRS.left;
  const ang = Math.atan2(d.y, d.x);
  ctx.save();
  ctx.translate(cx, cy);
  if (g.name === 'hound') {
    // low, lunging dog profile
    ctx.rotate(ang);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(-r * 0.15, 0, r * 0.78, r * 0.44, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(r * 0.58, 0, r * 0.36, 0, 7); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(r * 0.82, -r * 0.14); ctx.lineTo(r * 1.18, 0); ctx.lineTo(r * 0.82, r * 0.14);
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); // pricked ears
    ctx.moveTo(r * 0.4, -r * 0.3); ctx.lineTo(r * 0.5, -r * 0.62); ctx.lineTo(r * 0.66, -r * 0.26);
    ctx.moveTo(r * 0.4, r * 0.3); ctx.lineTo(r * 0.5, r * 0.62); ctx.lineTo(r * 0.66, r * 0.26);
    ctx.fill();
    ctx.fillStyle = dk;
    ctx.beginPath(); ctx.arc(r * 0.58, -r * 0.12, r * 0.07, 0, 7); ctx.arc(r * 0.58, r * 0.12, r * 0.07, 0, 7); ctx.fill();
  } else if (g.name === 'viper') {
    // serpent: tapering segments trailing the head, tongue forward
    ctx.rotate(ang);
    ctx.fillStyle = col;
    for (let i = 2; i >= 0; i--) {
      const sway = Math.sin(anim * 8 + i * 1.4) * r * 0.2;
      ctx.beginPath();
      ctx.arc(-r * (0.25 + i * 0.42), sway, r * (0.42 - i * 0.09), 0, 7);
      ctx.fill();
    }
    ctx.beginPath(); ctx.ellipse(r * 0.42, 0, r * 0.44, r * 0.32, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = fr ? dk : '#e05252'; ctx.lineWidth = Math.max(1, T * 0.07);
    ctx.beginPath(); ctx.moveTo(r * 0.84, 0); ctx.lineTo(r * 1.15, 0);
    ctx.moveTo(r * 1.15, 0); ctx.lineTo(r * 1.28, -r * 0.1);
    ctx.moveTo(r * 1.15, 0); ctx.lineTo(r * 1.28, r * 0.1);
    ctx.stroke();
    ctx.fillStyle = dk;
    ctx.beginPath(); ctx.arc(r * 0.5, -r * 0.12, r * 0.07, 0, 7); ctx.arc(r * 0.5, r * 0.12, r * 0.07, 0, 7); ctx.fill();
  } else if (g.name === 'shadow') {
    // tall half-seen figure: narrow cloak slab, hood, no legs
    ctx.globalAlpha = fr ? 1 : 0.85;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(-r * 0.45, r * 0.9);
    ctx.lineTo(-r * 0.45, -r * 0.35);
    ctx.quadraticCurveTo(0, -r * 1.05, r * 0.45, -r * 0.35);
    ctx.lineTo(r * 0.45, r * 0.9);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = fr ? dk : '#1a2030';
    ctx.beginPath(); ctx.ellipse(0, -r * 0.35, r * 0.26, r * 0.3, 0, 0, 7); ctx.fill();
    ctx.fillStyle = fr ? '#fff' : '#cfd8ea';
    ctx.beginPath();
    ctx.arc(-r * 0.1 + d.x * r * 0.08, -r * 0.38 + d.y * r * 0.08, r * 0.05, 0, 7);
    ctx.arc(r * 0.1 + d.x * r * 0.08, -r * 0.38 + d.y * r * 0.08, r * 0.05, 0, 7);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // stray: ragged mutt, always twitching
    const jx = fr ? 0 : Math.sin(anim * 13) * r * 0.09;
    const jy = fr ? 0 : Math.cos(anim * 17) * r * 0.09;
    ctx.rotate(ang);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(jx - r * 0.1, jy, r * 0.62, r * 0.5, 0, 0, 7); ctx.fill();
    ctx.beginPath(); // ragged torn ears
    ctx.moveTo(jx + r * 0.05, jy - r * 0.4); ctx.lineTo(jx - r * 0.12, jy - r * 0.85); ctx.lineTo(jx - r * 0.3, jy - r * 0.38);
    ctx.moveTo(jx + r * 0.05, jy + r * 0.4); ctx.lineTo(jx - r * 0.12, jy + r * 0.85); ctx.lineTo(jx - r * 0.3, jy + r * 0.38);
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(jx + r * 0.48, jy, r * 0.3, 0, 7); ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1, T * 0.09);
    ctx.beginPath(); ctx.moveTo(jx - r * 0.65, jy); ctx.lineTo(jx - r * 0.95, jy - r * 0.25); ctx.stroke();
    ctx.fillStyle = dk;
    ctx.beginPath(); ctx.arc(jx + r * 0.42, jy - r * 0.12, r * 0.07, 0, 7); ctx.arc(jx + r * 0.42, jy + r * 0.12, r * 0.07, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function drawCrate() {
  // parachuted supply crate
  const cx = FRUIT_POS.x * T, cy = FRUIT_POS.y * T, r = T * 0.55;
  ctx.fillStyle = '#7a5c34';
  ctx.fillRect(cx - r * 0.7, cy - r * 0.55, r * 1.4, r * 1.1);
  ctx.strokeStyle = '#caa96a'; ctx.lineWidth = Math.max(1, T * 0.08);
  ctx.strokeRect(cx - r * 0.7, cy - r * 0.55, r * 1.4, r * 1.1);
  ctx.beginPath();
  ctx.moveTo(cx, cy - r * 0.55); ctx.lineTo(cx, cy + r * 0.55);
  ctx.moveTo(cx - r * 0.7, cy); ctx.lineTo(cx + r * 0.7, cy);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(232,220,174,.65)';
  ctx.beginPath(); // chute lines above
  ctx.moveTo(cx - r * 0.5, cy - r * 0.55); ctx.quadraticCurveTo(cx, cy - r * 1.9, cx + r * 0.5, cy - r * 0.55);
  ctx.stroke();
}

function draw() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#0a0b12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // walls (flash white 4-5 times when the level is cleared)
  let walls = wallsMud;
  if (state === 'levelclear') {
    const p = 2.0 - stateTimer;
    if (p > 0.3 && Math.floor((p - 0.3) * 5) % 2 === 0) walls = wallsFlare;
  }
  if (walls) ctx.drawImage(walls, 0, 0);

  // dispatches (paper slips) and signal flares
  const pulse = 0.75 + 0.25 * Math.sin(anim * 5);
  for (let r = 0; r < ROWS; r++) {
    const row = grid[r];
    if (!row) continue;
    for (let c = 0; c < COLS; c++) {
      const ch = row[c];
      if (!ch) continue;
      const x = (c + 0.5) * T, y = (r + 0.5) * T;
      if (ch === '.') {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(0.5);
        ctx.fillStyle = '#d8c88a';
        ctx.fillRect(-T * 0.13, -T * 0.09, T * 0.26, T * 0.18);
        ctx.restore();
      } else {
        const gr = T * 1.15 * pulse;
        if (flareGlow) ctx.drawImage(flareGlow, x - gr, y - gr, gr * 2, gr * 2);
        ctx.fillStyle = '#fff6d8';
        ctx.beginPath(); ctx.arc(x, y, T * 0.18, 0, 7); ctx.fill();
      }
    }
  }

  if (fruitTimer > 0) drawCrate();

  if (state !== 'gameover' && state !== 'start') {
    if (state !== 'levelclear' && (state !== 'dying' || (2.6 - stateTimer) < 1.0)) {
      for (const g of ghosts) drawHunter(g);
    }
    drawFox();
  }

  // floating score popups
  for (const p of popups) {
    ctx.globalAlpha = Math.min(1, p.t * 2.5);
    ctx.fillStyle = p.color;
    ctx.font = `bold ${Math.round(T * 0.7)}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x * T, (p.y - (1 - p.t)) * T);
    ctx.globalAlpha = 1;
  }

  if (state === 'ready') {
    ctx.fillStyle = '#ffe9b0';
    ctx.font = `bold ${Math.round(T * 0.95)}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('RUN!', 14 * T, (TUNNEL_ROW + 3.5) * T + T * 0.35);
  }

  if (vig > 0.01) { // final life: pulsing red edge
    const cw = COLS * T, ch = ROWS * T;
    const vgr = ctx.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * 0.35, cw / 2, ch / 2, Math.max(cw, ch) * 0.62);
    const pulse = 0.06 * (1 + Math.sin(anim * 5));
    vgr.addColorStop(0, 'rgba(150,20,20,0)');
    vgr.addColorStop(1, 'rgba(150,20,20,' + Math.min(0.5, (0.3 + pulse) * vig) + ')');
    ctx.fillStyle = vgr;
    ctx.fillRect(0, 0, cw, ch);
  }
}

/* ------------------------------------------------------------------ */
/*  HUD / overlay                                                     */
/* ------------------------------------------------------------------ */
const $ = id => document.getElementById(id);
let shownScore = -1, shownHigh = -1;
function tickHud() {
  if (score !== shownScore) { shownScore = score; $('score').textContent = score; }
  if (high !== shownHigh) { shownHigh = high; $('high').textContent = high; }
}
function updateHud() {
  $('score').textContent = score;
  $('high').textContent = high;
  $('level').textContent = 'SECTOR ' + level;
  const n = Math.max(0, lives);
  $('lives').innerHTML = '<span class="fox-life"></span>'.repeat(n);
  $('btnPause').innerHTML = state === 'paused' ? '&#9654;' : '&#10074;&#10074;';
  $('btnSound').innerHTML = muted ? '&#128263;' : '&#128266;';
}

function updateOverlay() {
  const ov = $('overlay'), title = $('ovTitle'), msg = $('ovMsg');
  ov.classList.remove('over');
  if (state === 'start') {
    title.textContent = 'TRENCHFOX';
    msg.innerHTML = 'Run the line. Grab every dispatch.<br>Signal flares expose the hunt &mdash; run them down!<br><br><span class="pulse" style="color:#ffe9b0;letter-spacing:3px">TAP TO START</span><br><span style="font-size:11px;color:#778">(keyboard: arrows / WASD &middot; P to pause)</span>';
    ov.classList.remove('hidden');
  } else if (state === 'paused') {
    title.textContent = 'PAUSED';
    msg.innerHTML = '<span style="font-size:12px">' + missionHtml() + '</span><br><span class="pulse">Tap to resume</span>';
    ov.classList.remove('hidden');
  } else if (state === 'gameover') {
    title.textContent = 'CAUGHT';
    ov.classList.add('over');
    msg.innerHTML = 'Score: ' + score + (score >= high && score > 0 ? ' &mdash; new high score!' : '') +
      '<br><span id="ovRank" style="color:#ffd76a;letter-spacing:2px">RANK ' + arcade.rank().toUpperCase() +
      ' &middot; +' + lastXpGain + ' XP</span>' +
      '<br><span style="font-size:12px">' + missionHtml() + '</span>' +
      '<br><br><span class="pulse" style="color:#ffd23f;letter-spacing:3px">TAP TO PLAY AGAIN</span>';
    ov.classList.remove('hidden');
  } else {
    ov.classList.add('hidden');
  }
}

/* ------------------------------------------------------------------ */
/*  Sound                                                             */
/* ------------------------------------------------------------------ */
let actx = null;
function unlockAudio() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (actx && actx.state === 'suspended') actx.resume();
  musicInit();
}
function tone(f0, f1, dur, type, vol, delay) {
  if (muted || !actx || actx.state !== 'running') return;
  try {
    const t0 = actx.currentTime + (delay || 0);
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(Math.max(f0, 1), t0);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(t0); o.stop(t0 + dur + 0.03);
  } catch (e) {}
}
let lastTick = 0, tickStreak = 0;
const sfx = {
  // soft single paper-snick per dispatch; a fast unbroken streak creeps
  // upward in pitch (resets after a 0.8s gap) — subtle, no alternating loop
  tick() {
    if (anim - lastTick < 0.06) return;
    tickStreak = anim - lastTick > 0.8 ? 0 : tickStreak + 1;
    lastTick = anim;
    const f = 1180 * (1 + Math.min(tickStreak, 14) * 0.018);
    tone(f, f, 0.035, 'triangle', 0.05);
  },
  flare()   { tone(160, 1500, 0.5, 'sawtooth', 0.1); tone(2300, 1700, 0.45, 'sine', 0.04, 0.12); },
  rundown() { tone(240, 60, 0.24, 'square', 0.12); },
  death()   { tone(300, 38, 1.0, 'sawtooth', 0.13); tone(88, 44, 0.5, 'sine', 0.18, 0.06); },
  fruit()   { tone(520, 740, 0.13, 'triangle', 0.1); },
  life()    { tone(990, 1480, 0.12, 'sine', 0.1); tone(990, 1480, 0.12, 'sine', 0.1, 0.16); },
  // sector taken: a signal whistle, up then down
  clear()   { tone(840, 1350, 0.2, 'sine', 0.1); tone(1350, 780, 0.3, 'sine', 0.1, 0.24); },
  ready()   { tone(620, 990, 0.14, 'sine', 0.08); },
};

/* ---- dynamic music (ported from LAST FLARE): three continuous synth
   layers crossfaded by game state — low march, hunters-near tension,
   flare-reversal triumph. No scheduling, no samples. ---- */
const music = { layers: null, gains: { march: 0, tension: 0, triumph: 0 }, mode: 'march' };
function musicInit() {
  if (music.layers || !actx) return;
  try {
    const master = actx.createGain(); master.gain.value = 0.14; master.connect(actx.destination);
    const layer = () => { const g = actx.createGain(); g.gain.value = 0; g.connect(master); return g; };
    const osc = (type, freq, dest) => {
      const o = actx.createOscillator(); o.type = type; o.frequency.value = freq;
      o.connect(dest); o.start(); return o;
    };
    const pulse = (dest, rate, depth) => { // voice gain pulsed by a square LFO
      const vg = actx.createGain(); vg.gain.value = 1 - depth; vg.connect(dest);
      const lfo = actx.createOscillator(); lfo.type = 'square'; lfo.frequency.value = rate;
      const lg = actx.createGain(); lg.gain.value = depth;
      lfo.connect(lg); lg.connect(vg.gain); lfo.start();
      return vg;
    };
    const march = layer();              // low left-right-left march (C2 + G2)
    const mv = pulse(march, 1.8, 0.55);
    osc('triangle', 65.41, mv); osc('triangle', 98, mv);
    const tension = layer();            // hunters near: filtered minor-second grind
    const tf = actx.createBiquadFilter(); tf.type = 'lowpass'; tf.frequency.value = 500;
    tf.connect(pulse(tension, 3.2, 0.8));
    osc('sawtooth', 110, tf); osc('sawtooth', 116.54, tf);
    const triumph = layer();            // flare up: bright major-third fanfare pulse
    const uv = pulse(triumph, 4.2, 0.7);
    osc('triangle', 261.63, uv); osc('triangle', 329.63, uv);
    music.layers = { march, tension, triumph };
  } catch (e) {}
}
function musicTick(dt) {
  if (!music.layers) return;
  let tm = 0, tt = 0, tu = 0;
  if (state === 'playing' && !muted) {
    let near = false;
    for (const g of ghosts) {
      if (g.state !== 'active' || g.fright) continue;
      if (Math.abs(g.x - pac.x) + Math.abs(g.y - pac.y) < 6) { near = true; break; }
    }
    music.mode = frightTimer > 0 ? 'triumph' : near ? 'tension' : 'march';
    tm = music.mode === 'march' ? 1 : 0.25;
    tt = music.mode === 'tension' ? 1 : 0;
    tu = music.mode === 'triumph' ? 1 : 0;
  }
  const ease = Math.min(1, dt * 1.8);
  music.gains.march += (tm - music.gains.march) * ease;
  music.gains.tension += (tt - music.gains.tension) * ease;
  music.gains.triumph += (tu - music.gains.triumph) * ease;
  try {
    music.layers.march.gain.value = music.gains.march * 0.5;
    music.layers.tension.gain.value = music.gains.tension * 0.45;
    music.layers.triumph.gain.value = music.gains.triumph * 0.5;
  } catch (e) {}
}

/* ------------------------------------------------------------------ */
/*  Input                                                             */
/* ------------------------------------------------------------------ */
function setDesired(d) {
  pac.desired = d;
  if (state !== 'playing' || !pac.dir) return;
  if (d.x === -pac.dir.x && d.y === -pac.dir.y) {
    pac.dir = d; pac.lastDir = d; // reverse instantly, anywhere
    return;
  }
  tryCornerCut(d);
}

// Late-turn forgiveness: a swipe that lands just after the Fox has passed the
// intersection where it applies (up to ~half a tile / well under 150ms at run
// speed) executes retroactively as a corner cut — the overshoot distance is
// carried into the new direction, so no speed is lost and no wall is entered.
function tryCornerCut(d) {
  const horiz = pac.dir.x !== 0;
  if ((d.x !== 0) === horiz) return; // only perpendicular turns can cut
  const pos = horiz ? pac.x : pac.y;
  const sign = horiz ? pac.dir.x : pac.dir.y;
  const lc = sign > 0 ? Math.floor(pos + 0.5) - 0.5 : Math.ceil(pos - 0.5) + 0.5;
  const o = (pos - lc) * sign; // overshoot past the last crossed centre
  if (o <= 1e-4 || o > 0.45) return;
  const cx = horiz ? Math.floor(lc) : Math.floor(pac.x);
  const cy = horiz ? Math.floor(pac.y) : Math.floor(lc);
  if (!canGo(cx, cy, d)) return;
  if (horiz) { pac.x = lc; pac.y += d.y * o; }
  else { pac.y = lc; pac.x += d.x * o; }
  pac.dir = d; pac.lastDir = d;
}

function tapAction() {
  if (state === 'start' || state === 'gameover') newGame();
  else if (state === 'paused') { setState('playing'); }
}

function togglePause() {
  if (state === 'playing') setState('paused');
  else if (state === 'paused') setState('playing');
}

const stage = document.getElementById('stage');
let touch = null;
stage.addEventListener('touchstart', e => {
  e.preventDefault(); unlockAudio();
  const t = e.changedTouches[0];
  touch = { x: t.clientX, y: t.clientY, t: performance.now(), moved: false };
}, { passive: false });
stage.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touch.x, dy = t.clientY - touch.y;
  if (Math.max(Math.abs(dx), Math.abs(dy)) > 18) {
    setDesired(Math.abs(dx) > Math.abs(dy)
      ? (dx > 0 ? DIRS.right : DIRS.left)
      : (dy > 0 ? DIRS.down : DIRS.up));
    touch.x = t.clientX; touch.y = t.clientY; touch.moved = true;
  }
}, { passive: false });
stage.addEventListener('touchend', e => {
  e.preventDefault();
  if (touch && !touch.moved && performance.now() - touch.t < 450) tapAction();
  touch = null;
}, { passive: false });
stage.addEventListener('click', () => { unlockAudio(); tapAction(); }); // mouse (touch clicks are prevented above)

for (const btn of document.querySelectorAll('#dpad button')) {
  const d = DIRS[btn.dataset.dir];
  const h = e => { e.preventDefault(); unlockAudio(); setDesired(d); };
  btn.addEventListener('touchstart', h, { passive: false });
  btn.addEventListener('mousedown', h);
}

$('btnPause').addEventListener('click', e => { e.stopPropagation(); unlockAudio(); togglePause(); });
$('btnSound').addEventListener('click', e => {
  e.stopPropagation(); unlockAudio();
  muted = !muted;
  try { localStorage.setItem('trenchfox-muted', muted ? '1' : '0'); } catch (err) {}
  updateHud();
});

const KEYMAP = {
  ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
  w: 'up', s: 'down', a: 'left', d: 'right',
  W: 'up', S: 'down', A: 'left', D: 'right',
};
window.addEventListener('keydown', e => {
  unlockAudio();
  const dir = KEYMAP[e.key];
  if (dir) { e.preventDefault(); setDesired(DIRS[dir]); return; }
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (state === 'start' || state === 'gameover') newGame();
    else togglePause();
  } else if (e.key === 'p' || e.key === 'P') {
    togglePause();
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'playing') setState('paused');
});

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

/* ------------------------------------------------------------------ */
/*  Main loop                                                         */
/* ------------------------------------------------------------------ */
let last = performance.now();
function frame(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  if (state !== 'paused') update(dt);
  musicTick(dt);
  tickHud();
  draw();
  requestAnimationFrame(frame);
}

// debug/testing hook
window.__trenchfox = {
  press: (name) => setDesired(DIRS[name]),
  kill: () => { if (state === 'playing') killPac(); },
  winLevel: () => { if (state === 'playing') { dots = 0; setState('levelclear', 2.0); sfx.clear(); } },
  flare: () => { if (state === 'playing') igniteFlare(); },
  maze: () => MAP.slice(),
  dispatches: () => {
    const out = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (grid[r] && grid[r][c]) out.push({ r, c });
    }
    return out;
  },
  // test helper: clear the board down to the n dispatches nearest the Fox so
  // a bot can finish the sector through the real last-dispatch code path
  eatAllBut: (n) => {
    if (state !== 'playing') return;
    const left = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (grid[r] && grid[r][c]) left.push({ r, c, d: (r - pac.y) ** 2 + (c - pac.x) ** 2 });
    }
    left.sort((a, b) => a.d - b.d);
    for (const t of left.slice(n)) { grid[t.r][t.c] = null; dots--; }
  },
  music: () => ({ ready: !!music.layers, mode: music.mode, gains: { ...music.gains } }),
  missions: () => missions.map(m => ({ id: m.id, n: m.n, name: m.name, done: m.done, bonus: m.bonus })),
  rollMissionsWith: d => rollMissions(d), // test-only: fixed-date sheet
  routNearest: () => { // test-only: run down the closest exposed hunter
    if (state !== 'playing') return false;
    const g = ghosts.find(x => x.fright && x.state === 'active');
    if (g) eatGhost(g);
    return !!g;
  },
  snapshot: () => ({
    state, score, high, lives, level, dots, dotsEaten, frightTimer, vig,
    popups: popups.map(p => p.text),
    mazeIndex: (level - 1) % MAZES.length,
    pac: { x: pac.x, y: pac.y },
    ghosts: ghosts.map(g => ({ name: g.name, state: g.state, fright: g.fright, x: g.x, y: g.y })),
  }),
};

buildLevel();
resetActors();
resize();
updateHud();
updateOverlay();
requestAnimationFrame(frame);

// PWA: register the service worker (skipped on file:// where it's unsupported)
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
